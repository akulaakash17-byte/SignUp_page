<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignmrnt</title>
    <style>
    /* Simple Dark Red Theme */

* {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    margin: 0;
    background-color: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Form box */
form {
    background-color: #1c1c1c;
    padding: 30px;
    border-radius: 8px;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
}

/* Inputs */
input {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #333;
    background-color: #222;
    color: white;
    outline: none;
}

input::placeholder {
    color: #888;
}

input:focus {
    border-color: red;
}

button {
    padding: 10px;
    border-radius: 5px;
    border: none;
    background-color: red;
    color: white;
    font-weight: bold;
}

button:hover {
    background-color: #cc0000;
}

/* Login button outside form */
#login {
    margin-top: 15px;
    width: 300px;
}
    </style>
</head>

<body>
    <form onsubmit="signUpUser(event)">
        <input type="text" id="myInput" placeholder="enter your name">
        <input type="email" id="myEmail" placeholder="enter your email">
        <input type="password" id="myPassword" placeholder="enter your password">

        <button type="submit" id="btn">SignUp</button> 
    </form>
             <button type="submit" id="login">Login</button> 

    <script>
        
        let UsersList = [

            { id: 3, name: "saathvik", email: "saathvik@gmail.com", password: "saathvik123" }

        function signUpUser (event) {

            let myInputValue = document.getElementById("myInput").value;

            if (myInputValue === "" || myEmailValue === "" || myPasswordValue === "")
                return alert("All fields are required!");

            for (let i = 0; i < UsersList.length; i++) {

                    // event.preventDefault();

                document.getElementById("myPassword").value = "";
                document.getElementById("myInput").value = "";
                return console.log("Email already exists!");
                }

                else {
                    UsersList.push({ id: UsersList.length + 1, name: myInputValue, email: myEmailValue, password: myPasswordValue });
            console.log(UsersList);
                }

            }

            

        }

            let myInputValue = document.getElementById("myInput").value.trim();
            let myEmailValue = document.getElementById("myEmail").value.trim();
            let myPasswordValue = document.getElementById("myPassword").value.trim();

                return alert("All fields are required!");

                for (let i = 0; i < UsersList.length; i++) {

                    document.getElementById("myEmail").value = "";
                   document.getElementById("myPassword").value = "";
                   document.getElementById("myInput").value = "";
                    event.preventDefault();
                return console.log("Login Successfull");

                }else{
                    console.log("User does not exist!")
                }

            }



        }


    </script>
</body>

</html>
