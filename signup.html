<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignmrnt</title>
    <style>
        /* Dark Theme Red Style */

        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Form container */
        form {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Inputs */
        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #262626;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: red;
            box-shadow: 0 0 5px red;
        }

        /* Button */
        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background-color: red;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ff1a1a;
            box-shadow: 0 0 10px red;
        }
    </style>
</head>

<body>
    <form>
        <input type="text" id="myInput" placeholder="enter your name">
        <input type="email" id="myEmail" placeholder="enter your email">
        <input type="password" id="myPassword" placeholder="enter your password">

        <button type="submit" id="btn">SignUp</button>
    </form>
    <script>
        let UsersList = [
            { id: 1, name: "Akash", email: "akulaakash17@gmail.com", password: "akash123" },
            { id: 2, name: "shiva", email: "shiva@gmail.com", password: "shiva123" },
            { id: 3, name: "saathvik", email: "saathvik@gmail.com", password: "saathvik123" }

        ];
        btn.onclick = function () {
            document.getElementById("myInput").value;
            document.getElementById("myEmail").value;
            document.getElementById("myPassword").value;

            let myInputValue = document.getElementById("myInput").value.trim();
            let myEmailValue = document.getElementById("myEmail").value.trim();
            let myPasswordValue = document.getElementById("myPassword").value.trim();

            if (myInputValue === "" || myEmailValue === "" || myPasswordValue === "")
                return alert("All fields are required!");

            for (let i = 0; i < UsersList.length; i++) {
                if (UsersList[i].email === myEmailValue)
                    event.preventDefault();
                document.getElementById("myEmail").value = "";
                document.getElementById("myPassword").value = "";
                document.getElementById("myInput").value = "";
                return console.log("Email already exists!");

            }

            UsersList.push({ id: UsersList.length + 1, name: myInputValue, email: myEmailValue, password: myPasswordValue });
            console.log(UsersList);

            event.preventDefault();
        }





    </script>
</body>

</html>
